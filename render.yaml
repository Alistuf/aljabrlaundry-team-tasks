services:
  - type: web
    name: aljabr-laundry-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_DB_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        value: onboarding@resend.dev
      - key: ADMIN_EMAIL
        sync: false

  - type: static
    name: aljabr-laundry-frontend
    rootDir: frontend
    buildCommand: npm ci && CI=false npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: REACT_APP_BACKEND_URL
        sync: false
